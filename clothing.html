<!DOCTYPE html>
<html lang="en" data-theme="street">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIS | Neo-Ancient Label</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #FDF8F5; --text: #4E3629; --accent: #967E76; --card: #E8DFD8;
            --font-logo: 'Syncopate', sans-serif; --glow: rgba(150, 126, 118, 0.6);
            --gold: #D4AF37; 
        }

        [data-theme="fashion"] {
            --bg: #0A0F1E; --text: #F1E4C3; --accent: #D4AF37; --card: #121A2E;
            --glow: rgba(212, 175, 55, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; transition: background 0.8s ease; }

        /* --- PRELOADER (GOLD THEME) --- */
        #preloader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-wrap { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;}
        .logo-ring { position: absolute; width: 100%; height: 100%; border: 2px solid var(--gold); border-radius: 50%; border-top-color: transparent; animation: rotate 1.5s linear infinite; }
        #brand-logo { font-family: var(--font-logo); font-size: 2.5rem; color: #fff; z-index: 2; }
        #pre-quote { color: var(--gold); font-size: 10px; letter-spacing: 5px; font-family: var(--font-logo); opacity: 0; margin-top: 15px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);}
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- UI ELEMENTS --- */
        .theme-toggle { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); padding: 12px 25px; border-radius: 50px; border: 1px solid var(--text); cursor: pointer; font-family: var(--font-logo); font-size: 10px; color: var(--text); }
        #mini-cart { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--text); color: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 4000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-family: var(--font-logo); font-size: 10px; flex-direction: column; }
        
        /* --- HERO & QUOTE PLACEMENT --- */
        .hero { height: 45vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
        .hero h1 { font-family: var(--font-logo); font-size: 8vw; }
        
        #style-quote {
            margin-top: 20px;
            font-size: 11px; letter-spacing: 4px; font-family: var(--font-logo);
            color: var(--accent); opacity: 0; font-weight: 300;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; padding: 0 10% 100px; }
        .item-card { background: var(--card); padding: 25px; transition: 0.5s; }
        .item-card img { width: 100%; height: 480px; object-fit: cover; margin-bottom: 20px; }
        
        .size-btn { padding: 5px 10px; border: 1px solid var(--text); background: transparent; color: var(--text); cursor: pointer; margin-right: 5px; font-size: 10px; }
        .size-btn.active { background: var(--text); color: var(--bg); }
        .add-btn { width: 100%; padding: 15px; background: var(--text); color: var(--bg); border: none; font-family: var(--font-logo); font-size: 9px; cursor: pointer; margin-top: 15px; }

        .social-link { 
            display: inline-block; padding: 12px 30px; background: var(--text); color: var(--bg); 
            margin: 0 10px; text-decoration: none; font-weight: bold; font-family: var(--font-logo); 
            font-size: 10px; border-radius: 2px; transition: 0.3s ease;
        }
        .social-link:hover { transform: translateY(-5px); box-shadow: 0 0 25px var(--glow); }

        #manifest-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .manifest-box { width: 400px; background: var(--bg); padding: 50px; border: 1px solid var(--text); box-shadow: 20px 20px 0 var(--gold); }
        .manifest-input { width: 100%; padding: 15px; border: none; border-bottom: 2px solid var(--text); background: transparent; margin-bottom: 25px; outline: none; color: var(--text); font-weight: bold; font-size: 1.1rem; }

        .footer { padding: 100px 10%; border-top: 1px solid var(--text); background: var(--card); text-align: center; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="logo-wrap">
            <div class="logo-ring"></div>
            <div id="brand-logo">A</div>
        </div>
        <p id="pre-quote">SILENCE IS THE LOUDEST LUXURY.</p>
    </div>

    <div id="manifest-overlay">
        <div class="manifest-box">
            <h3 style="font-family: var(--font-logo); margin-bottom: 30px;">MANIFESTO_LOG</h3>
            <div id="items-list" style="margin-bottom: 10px; font-size: 14px; max-height: 150px; overflow-y: auto;"></div>
            <div id="grand-total" style="font-family: var(--font-logo); font-size: 14px; margin-bottom: 20px; border-top: 1px solid var(--text); padding-top: 10px; font-weight: bold;">TOTAL: ₹0</div>
            
            <input type="text" placeholder="NAME_IDENTIFIER" class="manifest-input">
            <input type="text" placeholder="SHIPPING_COORDINATES" class="manifest-input">
            <button class="add-btn" style="background:var(--gold); color:black;" onclick="alert('TRANSMISSION COMPLETE.')">AUTHORIZE</button>
            <button class="add-btn" style="background:none; color:var(--text); text-decoration:underline;" onclick="toggleManifest()">ABORT</button>
        </div>
    </div>

    <div id="mini-cart" onclick="toggleManifest()">
        <span id="count">0</span>
        <span id="cart-tag">BAG</span>
    </div>

    <div class="theme-toggle" onclick="swap()">
        <span id="style-name">STREET_ARCHIVE</span>
    </div>

    <section class="hero">
        <h1 id="brand-title">AETHERIS</h1>
        <div id="style-quote">ARCHIVE_SYSTEM_READY</div>
    </section>

    <div class="grid" id="main-grid"></div>

    <footer class="footer">
        <h2 style="font-family: var(--font-logo); margin-bottom: 40px; letter-spacing: 5px;">CENTRAL COMMAND & INQUIRIES</h2>
        <div style="margin-bottom: 40px; line-height: 2;">
            <p><strong>HQ:</strong> 40 RUE DE SÈVRES, 75007 PARIS</p>
            <p><strong>TEL:</strong> +91 9828781888</p>
            <p><strong>MAIL:</strong> ARCHIVE@AETHERIS.VOID</p>
        </div>
        <a href="#" class="social-link">INSTAGRAM</a>
        <a href="#" class="social-link">TWITTER</a>
    </footer>

    <script>
        const street = [
            { name: "Sand-Drift Parka", price: 3899, img: "https://images.unsplash.com/photo-1544022613-e87ca75a784a?q=80&w=800" },
            { name: "Earth-Tone Cargo", price: 2499, img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?q=80&w=800" },
            { name: "Clay Oversized Hoodie", price: 1999, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=800" },
            { name: "Industrial Tech Shell", price: 4299, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=800" }
        ];

        const fashion = [
            { name: "Emerald Weave", price: 24500, img: "https://images.unsplash.com/photo-1593032465175-481ac7f401a0?q=80&w=800" },
            { name: "The Andamane", price: 12900, img: "https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?q=80&w=800" },
            { name: "Midnight Silk Gown", price: 4999, img: "https://images.unsplash.com/photo-1566174053879-31528523f8ae?q=80&w=800" },
            { name: "Royal Linen Tunic", price: 3199, img: "https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=800" }
        ];

        let cart = [];

        function render(mode) {
            const grid = document.getElementById('main-grid');
            const data = mode === 'street' ? street : fashion;
            grid.innerHTML = '';
            data.forEach((item) => {
                grid.innerHTML += `
                    <div class="item-card">
                        <img src="${item.img}" alt="${item.name}">
                        <h4 style="font-family:var(--font-logo); font-size:10px">${item.name}</h4>
                        <div style="margin:10px 0;">
                            <button class="size-btn">S</button><button class="size-btn active">M</button><button class="size-btn">L</button>
                        </div>
                        <p style="font-weight:bold; font-size:1.2rem;">₹${item.price}</p>
                        <button class="add-btn" onclick="addToBag('${item.name}', ${item.price})">ADD_TO_BAG</button>
                    </div>
                `;
            });
        }

        function addToBag(name, price) {
            cart.push({name, price});
            document.getElementById('count').innerText = cart.length;
            gsap.to("#mini-cart", { scale: 1.3, duration: 0.1, yoyo: true, repeat: 1 });
            
            updateManifest();
        }

        function updateManifest() {
            const list = document.getElementById('items-list');
            const totalDisplay = document.getElementById('grand-total');
            
            list.innerHTML = cart.map(i => `<div style="padding:5px 0;">${i.name} - ₹${i.price}</div>`).join('');
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalDisplay.innerText = `TOTAL: ₹${total}`;
        }

        function swap() {
            const body = document.documentElement;
            const current = body.getAttribute('data-theme');
            const next = current === 'street' ? 'fashion' : 'street';
            body.setAttribute('data-theme', next);
            document.getElementById('style-name').innerText = next === 'street' ? 'STREET_ARCHIVE' : 'MODERN_COUTURE';
            
            const quote = document.getElementById('style-quote');
            quote.innerText = next === 'street' ? "URBAN ARCHIVE INITIATED" : "ROYAL LINEAGE ACTIVATED";
            gsap.fromTo(quote, {opacity: 0, y: 0}, {opacity: 1, y: 0, duration: 0.6});
            
            render(next);
        }

        function toggleManifest() {
            const m = document.getElementById('manifest-overlay');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#pre-quote", { opacity: 1, duration: 1 })
              .to("#preloader", { y: "-100%", duration: 1.2, ease: "expo.inOut", delay: 1 });
            render('street');
        };
    </script>
</body>
</html>
